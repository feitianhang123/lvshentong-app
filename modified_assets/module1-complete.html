        function focusSearch() {
            document.getElementById('searchInput').focus();
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                searchProduct();
            }
        }

        function searchProduct() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                alert('请输入产品名称');
                return;
            }

            const searchSection = document.getElementById('searchSection');
            const resultSection = document.getElementById('resultSection');
            const successResult = document.getElementById('successResult');
            const errorResult = document.getElementById('errorResult');
            const successDesc = document.getElementById('successDesc');

            // 显示加载中
            searchSection.style.display = 'none';
            resultSection.style.display = 'block';
            successResult.style.display = 'none';
            errorResult.style.display = 'none';
            successDesc.textContent = '搜索中...';

            // 模拟网络延迟（500ms）
            setTimeout(() => {
                // 在前端进行搜索
                const results = productCatalog.filter(product => 
                    product.includes(searchTerm) || 
                    product.toLowerCase().includes(searchTerm.toLowerCase())
                );

                if (results.length > 0) {
                    successResult.style.display = 'block';
                    errorResult.style.display = 'none';
                    
                    if (results.length === 1) {
                        successDesc.innerHTML = `
                            <div style="margin-bottom: 10px;">
                                <strong>找到产品：</strong>${results[0]}
                            </div>
                            <div style="margin-bottom: 10px;">
                                <strong>状态：</strong>该产品在绿色食品标准目录中
                            </div>
                            <div>
                                <strong>说明：</strong>符合绿色食品申报条件
                            </div>
                        `;
                    } else {
                        successDesc.innerHTML = `<div style="margin-bottom: 10px;"><strong>找到${results.length}个匹配产品：</strong></div>`;
                        const productList = document.createElement('div');
                        productList.className = 'product-list';
                        results.forEach((result, index) => {
                            productList.innerHTML += `
                                <div class="product-item">
                                    <strong>${index + 1}. ${result}</strong>
                                </div>
                            `;
                        });
                        successDesc.appendChild(productList);
                    }
                } else {
                    successResult.style.display = 'none';
                    errorResult.style.display = 'block';
                }
            }, 500);
        }

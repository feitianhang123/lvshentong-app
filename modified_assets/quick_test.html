<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速搜索测试</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .result { padding: 10px; margin: 5px; background: #f0f0f0; }
        .success { background: #d4edda; }
        .failure { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>快速搜索测试</h1>
    <div id="results"></div>

    <script>
        // 测试数据
        var testData = [
            ["27", "绿色食品温带水果\nNY/T844-2017", "苹果", ],
            [, , "梨", ],
            [, , "桃", ],
            [, , "葡萄", ],
            [, , "杏", ],
            [, , "石榴", ],
            ["28", "绿色食品大麦及大麦粉\nNY/T891-2014", "啤酒大麦", ],
            ["42", "绿色食品乳与乳制品\nNY/T657-2021", "生乳", ]
        ];

        function testSearch(product) {
            for (var i = 0; i < testData.length; i++) {
                var row = testData[i];
                for (var j = 0; j < row.length; j++) {
                    if (row[j] && row[j].toString().includes(product)) {
                        return { found: true, row: i+1, column: j+1, value: row[j] };
                    }
                }
            }
            return { found: false };
        }

        var products = ["苹果", "梨", "桃", "葡萄", "杏", "石榴", "啤酒大麦", "生乳"];
        var results = document.getElementById('results');
        
        products.forEach(function(product) {
            var result = testSearch(product);
            var div = document.createElement('div');
            div.className = 'result ' + (result.found ? 'success' : 'failure');
            
            if (result.found) {
                div.innerHTML = '✅ ' + product + ' - 找到在第' + result.row + '行第' + result.column + '列: ' + result.value;
            } else {
                div.innerHTML = '❌ ' + product + ' - 未找到';
            }
            
            results.appendChild(div);
        });
    </script>
</body>
</html>

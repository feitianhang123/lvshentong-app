            ['', '', '盐渍海带', '以鲜海带为原料，经漂烫、冷却、盐渍、脱水、切割或不切割等工序制成的产品。'],
            ['', '', '即食海带', '以鲜海带、干海带或盐渍海带为原料，经预处理、切割、熟化、调味、包装、杀菌等工艺制成的即食产品。'],
            ['', '', '干紫菜', '以紫菜原藻为原料，通过清洗、去杂、切碎、成型等预处理，采用自然风干、晒干、热风干燥、红外线干燥、微波干燥、低温冷冻干燥等工艺除去所含大部分水分制成的紫菜产品。'],

            ['', '', '干裙带菜', '以盐渍裙带菜为原料，经脱盐、清洗、脱水、切割、烘干等工序加工而成的产品。'],
            ['', '', '盐渍裙带菜', '以新鲜裙带菜为原料，经漂烫、冷却、盐渍等工序加工而成的藻类产品。'],
            ['', '', '即食裙带菜', '以鲜裙带菜、干裙带菜或盐渍裙带菜为原料，经预处理、切割、熟化、调味、包装、杀菌等工艺制成的即食产品。'],
            ['', '', '螺旋藻粉', '以螺旋藻为原料，经瞬时高温喷雾干燥制成的螺旋藻干粉。'],

            ['', '', '螺旋藻胶囊', ''],
            ['58', '绿色食品头足类水产品\nNY/T2975-2016', '头足类水产品', '海洋捕捞的乌贼目（sepiidae）所属的各种乌贼（又称墨鱼，如乌贼、金乌贼、微鳍乌贼、曼氏无针乌贼等）；枪乌贼目（teuthida）所属的各种鱿鱼（又称枪乌贼、柔鱼、笔管等）；八腕目（octopoda）所属的各种章鱼及蛸（如船蛸、长蛸、短蛸、真蛸等）的鲜活品、冻品和解冻品'],
            ['四、加工产品标准', '', '', ''],
            ['59', '绿色食品啤酒\nNY/T273-2021', '淡色啤酒', '色度2EBC~14EBC的啤酒'],
            ['', '', '浓色啤酒', '色度15EBC~40EBC的啤酒'],
            ['', '', '黑色啤酒', '色度大于等于41EBC的啤酒'],
            ['', '', '特种啤酒', '包括干啤酒、低醇啤酒、小麦啤酒、浑浊啤酒、冰啤酒。特种啤酒的理化指标除特征指标外，其他理化指标应符合相应啤酒（淡色、浓色、黑色啤酒）要求'],
            ['60', '绿色食品葡萄酒\nNY/T274-2023', '按色泽分类', '白葡萄酒、桃红葡萄酒、红葡萄酒'],
            ['', '', '按二氧化碳含量分类', '平静葡萄酒、含气葡萄酒（起泡葡萄酒、低起泡葡萄酒、葡萄酒汽酒）'],
            ['', '', '按酒中含糖量分类', '干葡萄酒、半干葡萄酒、半甜葡萄酒、甜葡萄酒、自然起泡葡萄酒、超天然起泡葡萄酒、天然起泡葡萄酒、绝干起泡葡萄酒、干起泡葡萄酒、半干起泡葡萄酒、甜起泡葡萄酒'],
            ['', '', '按酒精度分类', '葡萄酒、低度葡萄酒'],

            ['61', '绿色食品食用糖\nNY/T422-2021', '原糖', '以甘蔗汁经清净处理、煮炼结晶、离心分蜜制成的带有糖蜜、不供作直接食用的蔗糖结晶。'],
            ['', '', '白砂糖', '以甘蔗或甜菜为原料，经提取糖汁、清净处理、煮炼结晶和分蜜等工艺加工制成的蔗糖结晶。'],
            ['', '', '绵白糖', '以甘蔗或甜菜为原料，经提取糖汁、清净处理、煮炼结晶、分蜜并加入适量转化糖浆等工艺制成的晶粒细小、颜色洁白、质地绵软的糖。'],
            ['', '', '冰糖', '砂糖经再溶、清净处理，重结晶而制得的大颗粒结晶糖。有单晶体和多晶体两种，呈透明或半透明状。'],
            ['', '', '单晶体冰糖', '单一晶体的大颗粒（每粒重约1.5g-2g）冰糖。'],
            ['', '', '多晶体冰糖', '由多颗晶体并聚而成的大块冰糖。按色泽可分为白冰糖和黄冰糖两种。'],
            ['', '', '方糖', '由颗粒适中的白砂糖，加入少量水或糖浆，经压铸等工艺制成小方块的糖。'],
            ['', '', '精幼砂糖', '用原糖或其他蔗糖溶液，经精炼处理后制成的颗粒较小的糖。'],
            ['', '', '赤砂糖', '以甘蔗为原料，经提取糖汁、清净处理等工艺加工制成的带蜜的棕红色或黄褐色砂糖。'],
            ['', '', '红糖', '以甘蔗为原料，经提取糖汁、清净处理后，直接煮制不经分蜜的棕红色或黄褐色的糖。'],
            ['', '', '冰片糖', '用冰糖蜜或砂糖加原糖蜜为原料，经加酸部分转化，煮成的金黄色片糖。'],
            ['', '', '黄砂糖', '以甘蔗、甘蔗糖、甜菜、甜菜糖、糖蜜为原料加工生产制得的带蜜黄色蔗糖结晶。'],
            ['', '', '液体糖', '以白砂糖、绵白糖、精制的糖蜜或中间制品为原料，经加工或转化工艺制炼而成的食用液体糖。液体糖分为全蔗糖糖浆和转化糖浆两类，全蔗糖糖浆以蔗糖为主，转化糖浆是以蔗糖经部份转化为还原糖（葡萄糖+果糖）后的产品。'],
            ['', '', '糖霜', '以白砂糖为原料，添加适量的食用淀粉或抗结剂，经磨制或粉碎等加工而成的粉末状产品。'],
            ['62', '绿色食品果（蔬）酱\nNY/T431-2017', '水果酱', ''],
            ['', '', '番茄酱', ''],
            ['', '', '其他蔬菜酱', ''],
            ['', '', '', '注：本标准适用于以水果、蔬菜为主要原料，经破碎、打浆、灭菌、浓缩等工艺生产的绿色食品块状酱或泥状酱；不适用于以果蔬为主要原料，配以辣椒、盐、香辛料等调味料生产的调味酱产品。'],
            ['63', '绿色食品白酒\nNY/T432-2021', '白酒', ''],
            ['64', '绿色食品植物蛋白饮料\nNY/T433-2021', '植物蛋白饮料', '以一种或多种含有一定蛋白质的绿色食品植物果实、种子或种仁等为原料，添加或不添加其他食品原辅料和（或）食品添加剂，经加工或发酵制成的饮料。'],
            ['', '', '豆奶（乳）', '以大豆为主要原料，添加或不添加食品辅料和食品添加剂，经加工制成的产品。如纯豆奶（乳）、调制豆奶（乳）、浓浆豆奶（乳）等。经发酵工艺制成的产品称为发酵豆奶（乳），也可称为酸豆奶（乳）。'],
            ['', '', '豆奶（乳）饮料', '以大豆、大豆粉、大豆蛋白为主要原料，可添加食糖、营养强化剂、食品添加剂、其他食品辅料。经加工制成的、大豆固形物含量较低的产品。经发酵工艺制成的产品称为发酵豆奶（乳）饮料。'],
            ['64', '绿色食品植物蛋白饮料\nNY/T433-2021', '椰子乳（汁）', '以新鲜的椰子、椰子果肉制品（如椰子果浆、椰子果粉等）为原料，经加工制得的产品。以椰子果肉制品（椰子果浆、椰子果粉）为原料生产的产品称为复原椰子汁（乳）。'],
            ['', '', '杏仁乳（露）', '以杏仁为原料，可添加食品辅料、食品添加剂。经加工、调配后制得的产品。产品中去皮杏仁的质量比例应大于2.5%。不应使用除杏仁外的其他杏仁制品及其他含有蛋白质和脂肪的植物果实、种子、果仁及其制品。'],
            ['', '', '核桃乳（露）', '以核桃仁为原料，可添加食品辅料、食品添加剂。经加工、调配后制得的产品。产品中去皮核桃仁的质量比例应大于3%。不应使用除核桃仁外的其他核桃制品及其他含有蛋白质和脂肪的植物果实、种子、果仁及其制品。'],
            ['', '', '花生乳（露）', '以花生仁为主要原料，经磨碎、提浆等工艺制得的浆液中加入水、糖液等调制而成的乳状饮料。'],
            ['', '', '复合植物蛋白饮料', '以两种或两种以上含有一定蛋白质的植物果实、种子、种仁为原料，添加或不添加其他食品原辅料和（或）食品添加剂，经加工或发酵制成的饮料，如花生核桃、核桃杏仁、花生杏仁复合植物蛋白饮料。'],
            ['', '', '其它植物蛋白饮料', '以腰果、榛子、南瓜籽、葵花籽等为原料，经磨碎等工艺制得的浆液加入水、糖液等调制而成的饮料。'],
            ['65', '绿色食品果蔬汁饮料\nNY/T434-2016', '果蔬汁(浆)', '以水果或蔬菜为原料，采用物理方法制成的未发酵的汁液、浆液制品；或在浓缩果蔬汁中加入其加工过程中除去的等量水分复原制成的汁液、浆液制品。包括原榨果汁、果汁、蔬菜汁、果浆、蔬菜浆、复合果蔬汁（浆）。'],
            ['', '', '果蔬汁饮料', '以果蔬汁（浆）、浓缩果蔬汁（浆）、水为原料，添加或不添加其他辅料或食品添加剂，加工制成的制品。包括果蔬汁饮料、果肉（浆）饮料、复合果蔬汁饮料、果蔬汁饮料浓浆、水果饮料。'],
            ['', '', '浓缩果蔬汁（浆）', '以水果或蔬菜为原料，从采用物理方法制取的果汁（浆）或蔬菜汁（浆）中除去一定量水分制成的、加入其加工过程中除去的等量水分复原后具有果汁（浆）或蔬菜汁（浆）应有特征的制品。'],
            ['66', '绿色食品水果、蔬菜脆片\nNY/T435-2021', '水果、蔬菜（含食用菌）脆片', '以水果、蔬菜（含食用菌）为主要原料，经或不经切片（条、块），采用减压油炸脱水或非油炸脱水工艺，添加或不添加其他辅料制成的口感酥脆的即食型水果、蔬菜干制品。'],
            ['', '', '油炸型', '采用减压油炸脱水工艺制成的水果、蔬菜脆片。'],
            ['', '', '非油炸型', '采用真空冷冻干燥、微波真空干燥、压差闪蒸、气流膨化等非油炸脱水工艺制成的水果、蔬菜脆片。'],

        // 搜索产品函数
        function searchProduct() {
            console.log('搜索函数被调用');
            
            var productInput = document.getElementById('productInput');
            if (!productInput) {
                console.error('输入框元素未找到');
                alert('系统错误：输入框未找到');
                return;
            }
            
            var productName = productInput.value.trim();
            console.log('搜索关键词:', productName);
            
            if (!productName) {
                alert('请输入产品名称');
                return;
            }
            
            var resultSection = document.getElementById('resultSection');
            if (!resultSection) {
                console.error('结果区域元素未找到');
                alert('系统错误：结果区域未找到');
                return;
            }
            
            resultSection.style.display = 'block';
            
            // 搜索产品（在所有行中搜索ABCD列）
            var foundProducts = [];
            console.log('开始搜索，数据长度:', fullExcelData.length);
            
            for (var i = 0; i < fullExcelData.length; i++) {
                var row = fullExcelData[i];
                if (row && row.length >= 4) {
                    // 搜索所有列的内容
                    var searchText = '';
                    for (var j = 0; j < row.length; j++) {
                        if (row[j]) {
                            searchText += row[j].toString().toLowerCase() + ' ';
                        }
                    }
                    
                    if (searchText.toLowerCase().includes(productName.toLowerCase())) {
                        console.log('找到匹配行:', i, row);
                        
                        // 查找对应的标准名称（向上查找第一个非空的标准名称）
                        var standardName = '';
                        var standardRowNum = i;
                        
                        // 向上查找直到找到标准名称
                        while (standardRowNum >= 0 && !standardName) {
                            var currentRow = fullExcelData[standardRowNum];
                            if (currentRow && currentRow[1] && currentRow[1].toString().trim()) {
                                standardName = currentRow[1].toString().trim();
                                break;
                            }
                            standardRowNum--;
                        }
                        
                        // 如果没找到标准名称，使用默认值
                        if (!standardName) {
                            standardName = '标准名称未找到';
                        }
                        
                        foundProducts.push({
                            name: row[2] || row[0] || row[1] || row[3] || '未命名产品',
                            rowNumber: i + 1,
                            standard: standardName,
                            description: row[3] || '',
                            fullRow: row
                        });
                    }
                }
            }
            
            console.log('找到匹配产品数量:', foundProducts.length);
            
            if (foundProducts.length > 0) {
                var resultHTML = '<div class="result-success">';
                resultHTML += '<strong>找到 ' + foundProducts.length + ' 个匹配产品：</strong>';
                
                foundProducts.forEach(function(product) {
                    resultHTML += '<div class="product-info">';
                    resultHTML += '<div class="product-row"><strong>产品：</strong>' + product.name + '</div>';
                    resultHTML += '<div><strong>所在行：</strong>第 ' + product.rowNumber + ' 行</div>';
                    resultHTML += '<div><strong>适用标准：</strong>' + (product.standard || '暂无标准信息') + '</div>';
                    resultHTML += '<div><strong>产品说明：</strong>' + (product.description || '暂无说明') + '</div>';
                    resultHTML += '</div>';
                });
                
                resultHTML += '</div>';
                resultSection.innerHTML = resultHTML;
            } else {
                resultSection.innerHTML = [
                    '<div class="result-error">',
                    '<strong>申报产品不在绿色食品使用标准目录内，暂时无法申报绿色食品。</strong>',
                    '<div>请检查产品名称是否正确，或联系技术支持。</div>',
                    '</div>'
                ].join('');
            }
        }

            var searchSection = document.querySelector('.search-section');
            var resultSection = document.getElementById('resultSection');

                console.error('DOM元素未找到');
                alert('系统错误：页面元素未找到');
                return;
            }
            
            searchSection.style.display = 'none';
            resultSection.style.display = 'none';
            directoryView.style.display = 'block';
            
            var directoryContent = document.getElementById('directoryContent');
            if (!directoryContent) {
                console.error('目录内容元素未找到');
                alert('系统错误：目录内容未找到');
                return;
            }
            
            var directoryHTML = '<table class="directory-table">';
            directoryHTML += '<thead><tr><th>A列</th><th>B列</th><th>C列</th><th>D列</th></tr></thead><tbody>';
            
            // 显示所有数据
            fullExcelData.forEach(function(row, index) {
                directoryHTML += '<tr>';
                directoryHTML += '<td class="' + (row[0] ? '' : 'merged-cell') + '">' + (row[0] || '') + '</td>';
                directoryHTML += '<td class="' + (row[1] ? '' : 'merged-cell') + '">' + ((row[1] || '').toString().replace(/\\n/g, '<br>')) + '</td>';
                directoryHTML += '<td>' + (row[2] || '') + '</td>';
                directoryHTML += '<td>' + (row[3] || '') + '</td>';
                directoryHTML += '</tr>';
            });
            
            directoryHTML += '</tbody></table>';
            directoryHTML += '<div style="margin-top: 15px; color: #666;">显示 ' + fullExcelData.length + ' 行数据（完整目录，基于最新Excel文件）</div>';

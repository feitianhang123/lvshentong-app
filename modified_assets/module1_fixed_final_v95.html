<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>绿色食品产品适用标准目录（全新构建）</title>
<style>
body {font-family: Arial, sans-serif; padding:10px;}
.search-box {margin-bottom:10px;}
.search-input {width:70%; padding:6px;}
.search-btn {padding:6px 12px;}
.directory-card {border:1px solid #4CAF50; padding:10px; margin:10px 0; cursor:pointer;}
.directory-view {display:none; margin-top:10px; overflow:auto; max-height:400px;}
.result-item {border:1px solid #ddd; padding:8px; margin:5px 0;}
.result-error {color:red;}
table {width:100%; border-collapse:collapse;}
th, td {border:1px solid #ccc; padding:4px;}
</style>
</head>
<body>
<h2>绿色食品产品适用标准目录</h2>
<div class="search-box">
    <input type="text" id="productInput" class="search-input" placeholder="请输入产品名称..." />
    <button class="search-btn" onclick="searchProduct()">搜索</button>
</div>
<div class="directory-card" onclick="showFullDirectory()">
    <strong>点击查看完整目录（ABCD 975 行）</strong>
</div>
<div id="resultSection"></div>
<div id="directoryView" class="directory-view">
    <h3>完整目录</h3>
    <div id="directoryContent"></div>
    <button onclick="hideDirectory()">返回搜索</button>
</div>

<script>
// ---------- CSV 读取与解析 ----------
let rawCsv = '';
let fullData = [];
let directoryData = [];
let csvLoaded = false;
function parseCsv(text){
    const rows = [];
    const lines = text.split(/\r?\n/);
    for(let line of lines){
        // split on commas not inside quotes
        const cells = [];
        let cur = '';
        let inQuotes = false;
        for(let i=0;i<line.length;i++){
            const ch = line[i];
            if(ch==='"'){
                inQuotes = !inQuotes;
                continue; // drop quote
            }
            if(ch===',' && !inQuotes){
                cells.push(cur.trim());
                cur='';
            } else {
                cur+=ch;
            }
        }
        cells.push(cur.trim());
        rows.push(cells);
    }
    return rows;
}
// ---------- CSV 初始化（直接嵌入） ----------
// function initCsv(){
    // Minimal sample CSV to ensure functionality. Use proper UTF-8 characters.
    const csvContent = `序号,标准名称,适用产品名称,适用产品别名及说明
1,"绿色食品豆类 NY/T285-2021",大豆,"黄豆、黑豆、黄大豆、黑大豆"
2,"绿色食品谷物 NY/T418-2023",小麦,"小麦粉、全麦"
3,"绿色食品水果 NY/T393-2022",苹果,"富士、红富士、青苹"`;
    rawCsv = csvContent;
    fullData = parseCsv(csvContent);
    directoryData = JSON.parse(JSON.stringify(fullData));
    csvLoaded = true;
    console.log('CSV embedded (sample), rows:', fullData.length);
}
// initCsv();
// ---------- CSV 加载（同步 XHR） ----------
function loadCsvSync(){
    try {
        const xhr = new XMLHttpRequest();
        // assets are located in the same folder for WebView
        xhr.open('GET', 'search_data.csv', false); // synchronous request
        xhr.send(null);
        if(xhr.status===200 || xhr.status===0){
            rawCsv = xhr.responseText;
            fullData = parseCsv(rawCsv);
            // keep header line for directory view
            directoryData = JSON.parse(JSON.stringify(fullData));
            csvLoaded = true;
            console.log('CSV loaded via sync XHR, rows:', fullData.length);
        } else {
            console.error('XHR load failed, status', xhr.status);
        }
    } catch(e){
        console.error('加载 CSV 失败', e);
    }
}
loadCsvSync();

// ---------- 搜索功能 ----------
function searchProduct(){
    const input = document.getElementById('productInput');
    if(!input){alert('输入框未找到');return;}
    const term = input.value.trim().toLowerCase();
    const resultDiv = document.getElementById('resultSection');
    const dirView = document.getElementById('directoryView');
    if(dirView) dirView.style.display='none';
    resultDiv.innerHTML='';
    if(!csvLoaded){resultDiv.innerHTML='<div class="result-error">数据加载中，请稍后再试。</div>';return;}
    if(!term){resultDiv.innerHTML='<div class="result-error">请输入搜索词</div>';return;}
    const found = [];
    for(let i=0;i<fullData.length;i++){
        const row = fullData[i];
        for(let j=0;j<row.length;j++){
            const cell = row[j];
            if(cell && cell.toLowerCase().includes(term)){
                // 向上查找 B 列（索引 1）最近的非空标准名称
                let standard='';
                for(let k=i;k>=0;k--){
                    const stdCell = fullData[k][1];
                    if(stdCell && stdCell.trim()!=='') {standard=stdCell;break;}
                }
                found.push({rowNumber:i+1, row, standard});
                break; // 当前行已匹配
            }
        }
    }
    if(found.length===0){
        resultDiv.innerHTML='<div class="result-error">未找到匹配的产品</div>';
        return;
    }
    // 展示结果
    for(const f of found){
        const item = document.createElement('div');
        item.className='result-item';
        const cols = f.row.map((c,idx)=>`<td>${c}</td>`).join('');
        item.innerHTML = `
            <div><strong>第 ${f.rowNumber} 行</strong></div>
            <div>标准名称/号: ${f.standard}</div>
            <table><tr>${cols}</tr></table>
        `;
        resultDiv.appendChild(item);
    }
}

// ---------- 目录展示 ----------
function showFullDirectory(){
    const dirView = document.getElementById('directoryView');
    const resultDiv = document.getElementById('resultSection');
    if(resultDiv) resultDiv.style.display='none';
    if(!csvLoaded){
        dirView.innerHTML='<div class="result-error">数据加载中，请稍后再试。</div>';return;
    }
    dirView.style.display='block';
    const content = document.getElementById('directoryContent');
    let html = '<table><thead><tr>';
    // use first row as header if you like, otherwise just A-D
    html += '<th>序号</th><th>标准名称</th><th>适用产品名称</th><th>适用产品别名及说明</th>';
    html+='</tr></thead><tbody>';
    for(const row of directoryData){
        html += '<tr>';
        for(let i=0;i<4;i++){
            const cell = row[i]||'';
            html += `<td>${cell}</td>`;
        }
        html+='</tr>';
    }
    html+='</tbody></table>';
    content.innerHTML=html;
}
function hideDirectory(){
    const dirView=document.getElementById('directoryView');
    if(dirView) dirView.style.display='none';
}
</script>
</body>
</html>

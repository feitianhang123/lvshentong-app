<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绿色食品产品适用标准目录 - 绿色食品申报通</title>
<style>
/* 通用布局 */
* {margin:0;padding:0;box-sizing:border-box;}
body {font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#f8fff8 0%,#e8f5e8 100%);min-height:100vh;display:flex;flex-direction:column;}
.container {width:100%;flex:1;position:relative;padding-top:120px;padding-bottom:60px;overflow:hidden;}
header {background:linear-gradient(135deg,#4caf50 0%,#2e7d32 100%);color:white;padding:40px 20px;text-align:center;height:120px;display:flex;flex-direction:column;justify-content:center;position:fixed;top:0;left:0;right:0;z-index:1000;}
header h1 {font-size:32px;font-weight:bold;margin-bottom:8px;}
header p {font-size:18px;opacity:0.9;}

/* 搜索框 */
.search-section {padding:20px;background:#f8f9fa;border-bottom:1px solid #e9ecef;}
.search-section input {width:100%;padding:12px 20px;border:2px solid #4caf50;border-radius:25px;font-size:16px;outline:none;transition:border-color .3s;}
.search-section input:focus {border-color:#2e7d32;box-shadow:0 0 0 3px rgba(76,175,80,.1);}

/* 目录卡 */
.card-section {padding:20px;}
.directory-card {border:1px solid #4caf50;padding:15px;border-radius:8px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;}
.directory-card:hover {transform:translateY(-2px);box-shadow:0 4px 12px rgba(76,175,80,.2);}

/* 内容区 */
#resultSection,.directory-view {padding:20px;}
.result-item {border:1px solid #ddd;padding:8px;margin:5px 0;background:white;}
.result-error {color:red;}

table {width:100%;border-collapse:collapse;margin-top:10px;table-layout:fixed;}
/* 强制第四列（D列）换行、拆分长字符 */
td:nth-child(4) {white-space:normal !important;word-break:break-all;overflow-wrap:break-word;max-width:150px;}
/* 为所有单元格提供自动换行 */
td {word-break:break-all;overflow-wrap:break-word;}


th,td {border:1px solid #ccc;padding:4px;white-space:normal !important;word-wrap:break-word;overflow-wrap:break-word;}

footer {background:#f5f5f5;padding:15px 20px;text-align:center;font-size:12px;color:#666;border-top:1px solid #eee;position:fixed;bottom:0;left:0;right:0;height:60px;display:flex;flex-direction:column;justify-content:center;z-index:1000;}

@media (max-width:600px){header h1{font-size:24px;}header p{font-size:14px;}}
</style>
</head>
<body>
<header>
    <h1>绿色食品产品适用标准目录</h1>
    <p>查询绿色食品适用产品的标准信息</p>
</header>
<div class="container">
    <div class="search-section">
        <input type="text" id="productInput" placeholder="请输入产品名称或标准名称..." />
        
    </div>
    <div class="card-section">
        <div class="directory-card" onclick="showFullDirectory()">
            <strong>点击查看完整目录（2023版）</strong>
        </div>
    </div>
    <div id="resultSection"></div>
    <div id="directoryView" class="directory-view" style="display:none;">
        <h3>完整目录</h3>
        <div id="directoryContent"></div>
        <button onclick="hideDirectory()" style="margin-top:10px;padding:6px 12px;background:#4caf50;color:white;border:none;border-radius:4px;cursor:pointer;">返回搜索</button>
    </div>
</div>
<footer>
    <div>本软件内容均来源于中国绿色食品发展中心官网</div>
    <div>如果存在问题请联络作者：QQ:10780329</div>
</footer>
<script>
var rawCsv='';var fullData=[];var directoryData=[];var csvLoaded=false;
function parseCsv(text){
    const rows=[];
    let cur='';
    let inQuotes=false;
    let curRow=[];
    for(let i=0;i<text.length;i++){
        const ch=text[i];
        if(ch==='"'){
            // handle escaped double quotes
            if(inQuotes && i+1<text.length && text[i+1]==='"'){
                cur+='"';
                i++;
            } else {
                inQuotes=!inQuotes;
            }
        } else if(ch===',' && !inQuotes){
            curRow.push(cur.trim());
            cur='';
        } else if((ch==='\n' || ch==='\r') && !inQuotes){
            // end of row
            // handle CRLF
            if(ch==='\r' && i+1<text.length && text[i+1]==='\n'){
                i++;
            }
            curRow.push(cur.trim());
            cur='';
            rows.push(curRow);
            curRow=[];
        } else {
            cur+=ch;
        }
    }
    // push last row if any
    if(cur!=='' || curRow.length>0){
        curRow.push(cur.trim());
        rows.push(curRow);
    }
    return rows;
}
function loadCsvSync(){
    try{const xhr=new XMLHttpRequest();xhr.open('GET','file:///android_asset/www/search_data.csv',false);xhr.send(null);
        if(xhr.status===200||xhr.status===0){rawCsv=xhr.responseText;fullData=parseCsv(rawCsv);directoryData=JSON.parse(JSON.stringify(fullData));csvLoaded=true;console.log('CSV loaded via sync XHR, rows:',fullData.length);}else{console.error('XHR load failed, status',xhr.status);}}
    catch(e){console.error('加载 CSV 失败',e);}
}
loadCsvSync();
function searchProduct(){
    const term=document.getElementById('productInput').value.trim().toLowerCase();
    const resultDiv=document.getElementById('resultSection');
    const dirView=document.getElementById('directoryView');
    if(dirView) dirView.style.display='none';
    resultDiv.style.display='block';
    resultDiv.innerHTML='';
    if(!csvLoaded){resultDiv.innerHTML='<div class="result-error">数据加载中，请稍后再试。</div>';return;}
    if(!term){resultDiv.innerHTML='<div class="result-error">请输入搜索词</div>';return;}
    const found=[];
    for(let i=0;i<fullData.length;i++){
        const row=fullData[i];
        for(let j=0;j<row.length;j++){
            const cell=row[j];
            if(cell && cell.toLowerCase().includes(term)){
                let standard='';
                for(let k=i;k>=0;k--){const std=fullData[k][1];if(std && std.trim()){standard=std.trim();break;}}
                const matched=cell;
                found.push({rowNumber:i+1,row,standard,matched});
                break;
            }
        }
    }
    if(found.length===0){resultDiv.innerHTML='<div class="result-error">未找到匹配的产品</div>';return;}
    found.forEach(f=>{const item=document.createElement('div');item.className='result-item';item.innerHTML=`<div><strong>第 ${f.rowNumber} 行</strong></div><div>匹配内容: ${f.matched}</div><div>标准名称/号: ${f.standard}</div>`;resultDiv.appendChild(item);});
}
function showFullDirectory(){
    const dirView=document.getElementById('directoryView');
    const resultDiv=document.getElementById('resultSection');
    if(resultDiv) resultDiv.style.display='none';
    if(!csvLoaded){dirView.innerHTML='<div class="result-error">数据加载中，请稍后再试。</div>';return;}
    dirView.style.display='block';
    const content=document.getElementById('directoryContent');
    let html='<table><thead><tr><th>序号</th><th>标准名称</th><th>适用产品名称</th><th>适用产品别名及说明</th></tr></thead><tbody>';
    directoryData.forEach(row=>{html+='<tr>';for(let i=0;i<4;i++){const cell=row[i]||'';html+=`<td>${cell}</td>`;}html+='</tr>';});
    html+='</tbody></table>';
    content.innerHTML=html;
}
function hideDirectory(){const dirView=document.getElementById('directoryView');if(dirView) dirView.style.display='none';}
// 实时搜索（可选）
document.getElementById('productInput').addEventListener('input',searchProduct);
</script>
</body>
</html>

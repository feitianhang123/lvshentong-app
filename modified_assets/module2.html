    <style>

        .content { padding: 20极px; }

        .step { background: #f8fff8; border: 1px solid #e8极f5e8; border-radius: 10px; padding: 15px; margin-bottom: 12px; }
        .step-number { background: #4CAF50; color: white; width: 25px; height: 25px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 8px; }

    <div class="container">
        <div class="header">极
            <button class="back-btn" onclick="window.history.back()">←</button>
            <div class="module-title">申报指南</div>
        </div>
        
        <div class="content">
            <div class="section">
                <div class="section-title">绿色食品申报流程</div>
                <div class="step">
                    <span class="step-number">1</span>
                    <span class="step-text">准备申报材料：申请书、调查表、产品检测报告等</span>

                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span class="step-text">现场检查：由检查员进行产地环境和生产过程检查</span>
                </div>
                <div class="step">
                    <span class="step-number">4</span>
                    <span class="step-text">产品抽样检测：送检至定点检测机构</极span>
                </div>
                <div class="step">
                    <span class="step-number">5</span>
                    <span class="step-text">专家评审：中国绿色食品发展中心组织专家评审</span>
                </div>
                <div class="step">
                    <span class="step-number">6</span>
                    <span class="step-text">颁发证书：评审通过后颁发绿色食品证书</span>
                </div>
            </div>

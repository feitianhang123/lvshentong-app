<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预审核 - 绿色食品申报通</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f8fff8 0%, #e8f5e8 100%);
            min-height: 100vh;
            padding: 0;
            margin: 0;
            color: #333;
        }

        .container {
            width: 100%;
            height: 100vh;
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            position: relative;
            padding-top: 120px;
            padding-bottom: 60px;
        }

        .header {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .main-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .sub-title {
            font-size: 18px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
            text-align: center;
            height: calc(100vh - 180px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .coming-soon {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            color: #1565c0;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .coming-soon h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1976d2;
        }

        .feature-list {
            text-align: left;
            margin: 20px 0;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .feature-item {
            margin: 10px 0;
            padding-left: 25px;
            position: relative;
        }

        .feature-item:before {
            content: "🔍";
            position: absolute;
            left: 0;
            font-size: 16px;
        }

        .back-btn {
            background: #4CAF50;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .footer {
            background: #f5f5f5;
            padding: 15px 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            .header { padding: 30px 15px; }
            .main-title { font-size: 24px; }
            .sub-title { font-size: 14px; }
        }

        .badge {
            background: #ff9800;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="main-title">预审核</div>
            <div class="sub-title">敬请期待</div>
        </div>

        <div class="content">
            <div class="coming-soon">
                <span class="badge">敬请期待</span>
                <h2>预审核功能正在开发中</h2>
                <p>我们正在努力开发预审核功能,将为您提供更完善的申报服务</p>
            </div>

            <div class="feature-list">
                <div class="feature-item">智能预审核:自动检查申报材料的完整性和合规性</div>
                <div class="feature-item">风险评估:识别潜在的申报风险点</div>
                <div class="feature-item">改进建议:提供具体的材料完善建议</div>
                <div class="feature-item">进度追踪:实时查看预审核进度</div>
            </div>

            <button class="back-btn" onclick="history.back()">返回主页</button>
        </div>

        <div class="footer">
            <div>本软件内容均来源于中国绿色食品发展中心官网</div>
            <div>如果存在问题请联络作者:QQ:10780329</div>
        </div>
    </div>
</body>
</html>

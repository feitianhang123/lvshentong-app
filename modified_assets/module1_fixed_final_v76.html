            [, , "腌腊肉制品", "包括咸肉类（如腌咸肉、板鸭、酱封肉等）；腊肉类（如腊猪肉、腊牛肉、腊羊肉、腊鸡、腊鸭、腊兔、腊乳猪等）；腊肠类（如腊肠、风干肠、枣肠、南肠、香肚、发酵香肠等）；风干肉类（如风干牛肉、风干羊肉、风干鸡等）"], [, , "酱卤肉制品", "包括卤肉类（如盐水鸭、嫩卤鸡、白煮羊头、肴肉等）；酱肉类（如酱肘子、酱牛肉、酱鸭、扒鸡等）"], [, , "熏烧焙烤肉制品", "包括熏烤肉类（如熏肉、熏鸡、熏鸭）；烧烤肉类（如盐焗鸡、烤乳猪、叉烧肉等）；熟培根类（如五花培根、通脊培根等）"], [, , "肉干制品", "包括肉干、肉松、肉脯"], [, , "肉类罐头", "不包括内脏类的所有肉罐头"], ["48", "绿色食品畜禽可食用副产品\nNY/T1513-2017", "畜禽可食用的生鲜副产品", "畜（猪、牛、羊、兔）禽（鸡、鸭、鹅、鸽）的头（舌、耳）、尾、翅膀、蹄爪、内脏（肝、肾、肠、心、肺、胃）、皮等可食用的生鲜副产品"], [, , "畜禽可食用的熟制副产品", "以生鲜畜禽可食用副产品为原料，添加或不添加辅料，经腌、腊、卤、酱、蒸、煮、熏、烧、烤等一种或多种加工方式制成的可直接食用的制品。"], [, , , "注：不适用于骨及血类等畜禽可食用副产品。"], ["三、渔业产品标准", , , ], ["49", "绿色食品虾\nNY/T840-2020", "对虾科", ], 
            [, , "长额虾科", ], [, , "褐虾科", ], [, , "长臂虾科", ], [, , "螯虾科", "如小龙虾"], [, , , "注：1.适用于活虾、鲜虾、速冻生虾、速冻熟虾，不适用于虾干制品；2.冻虾的形式可以是冻全虾、去头虾、带尾虾和虾仁。"], ["50", "绿色食品蟹\nNY/T841-2021", "淡水蟹活品", ], [, , "海水蟹活品", ], [, , "海水蟹冻品", "包括冻梭子蟹、冻切蟹、冻蟹肉"], ["51", "绿色食品鱼\nNY/T842-2021", "活鱼", "包括淡水、海水产品"], [, , "鲜鱼", "包括淡水、海水产品"], 
            [, , "去内脏或分割加工后冷冻的初加工鱼产品", "包括淡水、海水产品"], [, , , "不适用于水发水产品。"], ["52", "绿色食品龟鳖类\nNY/T1050-2018", "中华鳖", "甲鱼、团鱼、王八、元鱼"], [, , "黄喉拟水龟", ], [, , "三线闭壳龟", "金钱龟、金头龟、红肚龟"], [, , "红耳龟", "巴西龟、巴西彩龟、秀丽锦龟、彩龟"], [, , "鳄龟", "肉龟、小鳄龟、小鳄鱼龟"], [, , "其他淡水养殖的食用龟鳖", ], [, , , "注：不适用于非人工养殖的野生龟鳖"], ["53", "绿色食品海水贝\nNY/T1329-2017", "海水贝类的鲜、活品", "包括鲍鱼、泥蚶、毛蚶（赤贝）、魁蚶、贻贝、红螺、香螺、玉螺、泥螺、栉孔扇贝、海湾扇贝、牡蛎、文蛤、杂色蛤、青柳蛤、大竹蛏和缢蛏的鲜、活品"], 
            ["53", "绿色食品海水贝\nNY/T1329-2017", "海水贝类肉的冻品", "包括鲍鱼、蚶肉、贻贝肉、螺肉、扇贝肉、扇贝柱、牡蛎肉、蛤肉和蛏肉的冻品"], [, , , "注：冻品包括生制和熟制冻品"], ["54", "绿色食品海参及制品\nNY/T1514-2020", "活海参", ], [, , "盐渍海参", ], [, , "干海参", ], [, , "冻干海参", ], [, , "即食海参", ], ["55", "绿色食品海蜇制品\nNY/T1515-2020", "盐渍海蜇皮", ], [, , "盐渍海蜇头", ], [, , "即食海蜇", ], 
            ["56", "绿色食品蛙类及制品\nNY/T1516-2020", "活蛙", "包括牛蛙、虎纹蛙、棘胸蛙、林蛙、美蛙等可供人们安全食用的养殖蛙类"], [, , "鲜蛙体", ], [, , "蛙类干制品", ], [, , "蛙类冷冻制品", ], ["57", "绿色食品藻类及其制品\nNY/T1709-2021", "干海带", "以鲜海带为原料，直接晒干或烘干的干海带产品。"], [, , "盐渍海带", "以鲜海带为原料，经漂烫、冷却、盐渍、脱水、切割或不切割等工序制成的产品。"], [, , "即食海带", "以鲜海带、干海带或盐渍海带为原料，经预处理、切割、熟化、调味、包装、杀菌等工艺制成的即食产品。"], [, , "干紫菜", "以紫菜原藻为原料，通过清洗、去杂、切碎、成型等预处理，采用自然风干、晒干、热风干燥、红外线干燥、微波干燥、低温冷冻干燥等工艺除去所含大部分水分制成的紫菜产品。"], [, , "即食紫菜", "以鲜紫菜、干紫菜或盐渍紫菜为原料，经预处理、切割、熟化、调味、包装、杀菌等工艺制成的即食产品"], [, , "干裙带菜", "以盐渍裙带菜为原料，经脱盐、清洗、脱水、切割、烘干等工序加工而成的产品。"], 
            [, , "盐渍裙带菜", "以新鲜裙带菜为原料，经漂烫、冷却、盐渍等工序加工而成的藻类产品。"], [, , "即食裙带菜", "以鲜裙带菜、干裙带菜或盐渍裙带菜为原料，经预处理、切割、熟化、调味、包装、杀菌等工艺制成的即食产品。"], [, , "螺旋藻粉", "以螺旋藻为原料，经瞬时高温喷雾干燥制成的螺旋藻干粉。"], [, , "螺旋藻片", ], [, , "雨生红球藻粉", "以采收的雨生红球藻藻体及孢子为原料，经破壁、干燥等工艺制成的雨生红球藻粉。"], [, , "螺旋藻胶囊", ], ["58", "绿色食品头足类水产品\nNY/T2975-2016", "头足类水产品", "海洋捕捞的乌贼目（sepiidae）所属的各种乌贼（又称墨鱼，如乌贼、金乌贼、微鳍乌贼、曼氏无针乌贼等）；枪乌贼目（teuthida）所属的各种鱿鱼（又称枪乌贼、柔鱼、笔管等）；八腕目（octopoda）所属的各种章鱼及蛸（如船蛸、长蛸、短蛸、真蛸等）的鲜活品、冻品和解冻品"], ["四、加工产品标准", , , ], ["59", "绿色食品啤酒\nNY/T273-2021", "淡色啤酒", "色度2EBC~14EBC的啤酒"], [, , "浓色啤酒", "色度15EBC~40EBC的啤酒"], 
            [, , "黑色啤酒", "色度大于等于41EBC的啤酒"], [, , "特种啤酒", "包括干啤酒、低醇啤酒、小麦啤酒、浑浊啤酒、冰啤酒。特种啤酒的理化指标除特征指标外，其他理化指标应符合相应啤酒（淡色、浓色、黑色啤酒）要求"], ["60", "绿色食品葡萄酒\nNY/T274-2023", "按色泽分类", "白葡萄酒、桃红葡萄酒、红葡萄酒"], [, , "按二氧化碳含量分类", "平静葡萄酒、含气葡萄酒（起泡葡萄酒、低起泡葡萄酒、葡萄酒汽酒）"], [, , "按酒中含糖量分类", "干葡萄酒、半干葡萄酒、半甜葡萄酒、甜葡萄酒、自然起泡葡萄酒、超天然起泡葡萄酒、天然起泡葡萄酒、绝干起泡葡萄酒、干起泡葡萄酒、半干起泡葡萄酒、甜起泡葡萄酒"], [, , "按酒精度分类", "葡萄酒、低度葡萄酒"], [, , "按产品特性分类", "冰葡萄酒、低度葡萄酒、贵腐葡萄酒、产膜葡萄酒、利口葡萄酒、加香葡萄酒、脱醇葡萄酒、原生葡萄酒"], ["61", "绿色食品食用糖\nNY/T422-2021", "原糖", "以甘蔗汁经清净处理、煮炼结晶、离心分蜜制成的带有糖蜜、不供作直接食用的蔗糖结晶。"], [, , "白砂糖", "以甘蔗或甜菜为原料，经提取糖汁、清净处理、煮炼结晶和分蜜等工艺加工制成的蔗糖结晶。"], [, , "绵白糖", "以甘蔗或甜菜为原料，经提取糖汁、清净处理、煮炼结晶、分蜜并加入适量转化糖浆等工艺制成的晶粒细小、颜色洁白、质地绵软的糖。"], 
            [, , "冰糖", "砂糖经再溶、清净处理，重结晶而制得的大颗粒结晶糖。有单晶体和多晶体两种，呈透明或半透明状。"], [, , "单晶体冰糖", "单一晶体的大颗粒（每粒重约1.5g-2g）冰糖。"], [, , "多晶体冰糖", "由多颗晶体并聚而成的大块冰糖。按色泽可分为白冰糖和黄冰糖两种。"], [, , "方糖", "由颗粒适中的白砂糖，加入少量水或糖浆，经压铸等工艺制成小方块的糖。"], [, , "精幼砂糖", "用原糖或其他蔗糖溶液，经精炼处理后制成的颗粒较小的糖。"], [, , "赤砂糖", "以甘蔗为原料，经提取糖汁、清净处理等工艺加工制成的带蜜的棕红色或黄褐色砂糖。"], [, , "红糖", "以甘蔗为原料，经提取糖汁、清净处理后，直接煮制不经分蜜的棕红色或黄褐色的糖。"], [, , "冰片糖", "用冰糖蜜或砂糖加原糖蜜为原料，经加酸部分转化，煮成的金黄色片糖。"], [, , "黄砂糖", "以甘蔗、甘蔗糖、甜菜、甜菜糖、糖蜜为原料加工生产制得的带蜜黄色蔗糖结晶。"], [, , "液体糖", "以白砂糖、绵白糖、精制的糖蜜或中间制品为原料，经加工或转化工艺制炼而成的食用液体糖。液体糖分为全蔗糖糖浆和转化糖浆两类，全蔗糖糖浆以蔗糖为主，转化糖浆是以蔗糖经部份转化为还原糖（葡萄糖+果糖）后的产品。"], 
            [, , "糖霜", "以白砂糖为原料，添加适量的食用淀粉或抗结剂，经磨制或粉碎等加工而成的粉末状产品。"], ["62", "绿色食品果（蔬）酱\nNY/T431-2017", "水果酱", ], [, , "番茄酱", ], [, , "其他蔬菜酱", ], [, , , "注：本标准适用于以水果、蔬菜为主要原料，经破碎、打浆、灭菌、浓缩等工艺生产的绿色食品块状酱或泥状酱；不适用于以果蔬为主要原料，配以辣椒、盐、香辛料等调味料生产的调味酱产品。"], ["63", "绿色食品白酒\nNY/T432-2021", "白酒", ], ["64", "绿色食品植物蛋白饮料\nNY/T433-2021", "植物蛋白饮料", "以一种或多种含有一定蛋白质的绿色食品植物果实、种子或种仁等为原料，添加或不添加其他食品原辅料和（或）食品添加剂，经加工或发酵制成的饮料。"], [, , "豆奶（乳）", "以大豆为主要原料，添加或不添加食品辅料和食品添加剂，经加工制成的产品。如纯豆奶（乳）、调制豆奶（乳）、浓浆豆奶（乳）等。经发酵工艺制成的产品称为发酵豆奶（乳），也可称为酸豆奶（乳）。"], [, , "豆奶（乳）饮料", "以大豆、大豆粉、大豆蛋白为主要原料，可添加食糖、营养强化剂、食品添加剂、其他食品辅料。经加工制成的、大豆固形物含量较低的产品。经发酵工艺制成的产品称为发酵豆奶（乳）饮料。"], ["64", "绿色食品植物蛋白饮料\nNY/T433-2021", "椰子乳（汁）", "以新鲜的椰子、椰子果肉制品（如椰子果浆、椰子果粉等）为原料，经加工制得的产品。以椰子果肉制品（椰子果浆、椰子果粉）为原料生产的产品称为复原椰子汁（乳）。"], 
            [, , "杏仁乳（露）", "以杏仁为原料，可添加食品辅料、食品添加剂。经加工、调配后制得的产品。产品中去皮杏仁的质量比例应大于2.5%。不应使用除杏仁外的其他杏仁制品及其他含有蛋白质和脂肪的植物果实、种子、果仁及其制品。"], [, , "核桃乳（露）", "以核桃仁为原料，可添加食品辅料、食品添加剂。经加工、调配后制得的产品。产品中去皮核桃仁的质量比例应大于3%。不应使用除核桃仁外的其他核桃制品及其他含有蛋白质和脂肪的植物果实、种子、果仁及其制品。"], [, , "花生乳（露）", "以花生仁为主要原料，经磨碎、提浆等工艺制得的浆液中加入水、糖液等调制而成的乳状饮料。"], [, , "复合植物蛋白饮料", "以两种或两种以上含有一定蛋白质的植物果实、种子、种仁为原料，添加或不添加其他食品原辅料和（或）食品添加剂，经加工或发酵制成的饮料，如花生核桃、核桃杏仁、花生杏仁复合植物蛋白饮料。"], [, , "其它植物蛋白饮料", "以腰果、榛子、南瓜籽、葵花籽等为原料，经磨碎等工艺制得的浆液加入水、糖液等调制而成的饮料。"], ["65", "绿色食品果蔬汁饮料\nNY/T434-2016", "果蔬汁(浆)", "以水果或蔬菜为原料，采用物理方法制成的未发酵的汁液、浆液制品；或在浓缩果蔬汁中加入其加工过程中除去的等量水分复原制成的汁液、浆液制品。包括原榨果汁、果汁、蔬菜汁、果浆、蔬菜浆、复合果蔬汁（浆）。"], [, , "果蔬汁饮料", "以果蔬汁（浆）、浓缩果蔬汁（浆）、水为原料，添加或不添加其他辅料或食品添加剂，加工制成的制品。包括果蔬汁饮料、果肉（浆）饮料、复合果蔬汁饮料、果蔬汁饮料浓浆、水果饮料。"], [, , "浓缩果蔬汁（浆）", "以水果或蔬菜为原料，从采用物理方法制取的果汁（浆）或蔬菜汁（浆）中除去一定量水分制成的、加入其加工过程中除去的等量水分复原后具有果汁（浆）或蔬菜汁（浆）应有特征的制品。"], ["66", "绿色食品水果、蔬菜脆片\nNY/T435-2021", "水果、蔬菜（含食用菌）脆片", "以水果、蔬菜（含食用菌）为主要原料，经或不经切片（条、块），采用减压油炸脱水或非油炸脱水工艺，添加或不添加其他辅料制成的口感酥脆的即食型水果、蔬菜干制品。"], [, , "油炸型", "采用减压油炸脱水工艺制成的水果、蔬菜脆片。"], 
            [, , "非油炸型", "采用真空冷冻干燥、微波真空干燥、压差闪蒸、气流膨化等非油炸脱水工艺制成的水果、蔬菜脆片。"], ["67", "绿色食品蜜饯\nNY/T436-2018", "糖渍类", "原料经糖熬煮或浸渍、干燥（或不干燥）等工艺制成的带有湿润糖液或浸渍在浓糖液中的制品"], [, , "糖霜类", "原料经加糖熬煮、干燥等工艺制成的表面附有白色糖霜的制品"], [, , "果脯类", "原料经糖渍、干燥等工艺制成的略有透明感，表面无糖析出的制品"], [, , "凉果类", "原料经盐渍、糖渍、干燥等工艺制成的半干态制品"], [, , "话化类", "原料经盐渍、糖渍（或不糖渍）、干燥等工艺制成的制品"], [, , "果糕类", "原料加工成酱状，经成型、干燥（或不干燥）等工艺制成的制品，分为糕类、条类和片类"], ["68", "绿色食品酱腌菜\nNY/T437-2023", "酱腌菜", "以新鲜蔬菜为主要原料，经腌渍或酱渍加工而成的各种蔬菜制品的总称。"], ["68", "绿色食品酱腌菜\nNY/T437-2023", "酱渍菜", "蔬菜咸坯经脱盐脱水后，再经甜酱、黄酱酱渍而成的制品。如扬州酱菜、镇江酱菜等。"], [, , "糖醋渍菜", "蔬菜咸坯经脱盐脱水后，再用糖渍、醋渍或糖醋渍制作而成的制品。如糖蒜、蜂蜜蒜米、甜酸藠头、糖醋萝卜等"], 
            [, , "酱油渍菜", "蔬菜咸坯经脱盐脱水后，用酱油与调味料、香辛料混合浸渍而成的制品。如五香大头菜、榨菜萝卜、辣油萝卜丝、酱海带丝等。"], [, , "虾油渍菜", "新鲜蔬菜先经盐渍或不经盐渍，再用新鲜虾油浸渍而成的制品。如锦州虾油小菜、虾油小黄瓜等。"], [, , "盐水渍菜", "以新鲜蔬菜为原料，用盐水及香辛料混合腌制，经发酵或非发酵而成的制品。如泡菜、酸黄瓜、盐水笋等。"], [, , "盐渍菜", "以新鲜蔬菜为原料，用食盐盐渍而成的湿态、半干态、干态制品。如咸大头菜、榨菜、萝卜干等"], [, , "糟渍菜", "蔬菜咸坯用酒糟或醪糟糟渍而成的制品。如糟瓜等"], [, , "其它类", "除了以上分类以外，其它以蔬菜为原料制作而成的制品。如糖冰姜、藕脯、酸甘蓝、米糠萝卜等。"], [, , , "注：不适用于散装的酱腌菜产品；不适用于叶菜类蔬菜原料生产的酱腌菜。"], ["69", "绿色食品食用植物油\nNY/T751-2021", "菜籽油", "包括低芥酸菜籽油"], [, , "大豆油", ], [, , "花生油", ], 
            [, , "芝麻油", ], [, , "亚麻籽油", "胡麻油"], [, , "葵花籽（仁）油", ], [, , "玉米油", ], [, , "茶叶籽油", ], [, , "油茶籽油", ], [, , "米糠油", ], [, , "核桃油", ], [, , "红花籽油", ], [, , "葡萄籽油", ], 
            [, , "橄榄油", ], [, , "牡丹籽油", ], [, , "棕榈（仁）油", ], [, , "沙棘籽油", ], [, , "紫苏籽油", ], [, , "精炼椰子油", ], [, , "南瓜籽油", ], [, , "秋葵籽油", ], [, , "食用调和油", ], ["70", "绿色食品黄酒\nNY/T897-2017", "传统型干黄酒", ], 
            [, , "传统型半干黄酒", ], [, , "传统型半甜黄酒", ], [, , "传统型甜黄酒", ], [, , "清爽型干黄酒", ], [, , "清爽型半干黄酒", ], [, , "清爽型半甜黄酒", ], [, , "清爽型甜黄酒", ], [, , "特型黄酒", ], ["71", "绿色食品含乳饮料\nNY/T898-2016", "配制型含乳饮料", "以乳或乳制品为原料，加入水，以及食糖和（或）甜味剂、酸味剂、果汁、茶、咖啡、植物提取液等的一种或几种调制而成的饮料"], [, , "发酵型含乳饮料", "以乳或乳制品为原料，经乳酸菌等有益菌培养发酵制得的乳液中加入水，以及食糖和（或）甜味剂、酸味剂、果汁、茶、咖啡、植物提取液等的一种或几种调制而成的饮料。也可称为酸乳（奶）饮料，按杀菌方式分为杀菌型和非杀菌型"], 
            [, , "乳酸菌饮料", "以乳或乳制品为原料，经乳酸菌发酵制得的乳液中加入水、食用糖和（或）甜味剂、酸味剂、果汁、茶、咖啡、植物提取液等的一种或几种调制而成的饮料。"], ["72", "绿色食品冷冻饮品\nNY/T899-2016", "冰淇淋", "以饮用水、乳和（或）乳制品、蛋制品、水果制品、豆制品、食糖、食用植物油等的一种或多种为原辅料，添加或不添加食品添加剂和（或）食品营养强化剂，经混合、灭菌、均质、冷却、老化、冻结、硬化等工艺制成的体积膨胀的冷冻饮品"], [, , "雪泥", "以饮用水、食糖、果汁等为主要原料，配以相关辅料，含或不含食品添加剂和食品营养强化剂，经混合、灭菌、凝冻或低温炒制等工艺制成的松软的冰雪状冷冻饮品。"], [, , "雪糕", "以饮用水、乳和（或）乳制品、蛋制品、果蔬制品、粮谷制品、豆制品、食糖、食用植物油等的一种或多种为原辅料，添加或不添加食品添加剂和（或）食品营养强化剂，经混合、灭菌、均质、冷却、成型、冻结等工艺制成的冷冻饮品。"], [, , "冰棍", "以饮用水、食糖和（或）甜味剂等为主要原料，配以豆类或果品等相关辅料（含或不含食品添加剂和食品营养强化剂），经混合、灭菌、冷却、注模、插或不插杆、冻结、脱模等工艺制成的带或不带棒的冷冻饮品。"], [, , "甜味冰", "以饮用水、食糖等为主要原料，添加或不添加食品添加剂，经混合、灭菌、罐装、硬化等工艺制成的冷冻饮品。"], [, , "食用冰", "以饮用水为原料，经灭菌、注模、冻结、脱模或不脱模等工艺制成的冷冻饮品。"], ["73", "绿色食品发酵调味品\nNY/T900-2016", "酱油", "包括高盐稀态发酵酱油和低盐固态发酵酱油"], [, , "食醋", "包括固态发酵食醋和液态发酵食醋"], [, , "酿造酱", "包括豆酱（油制型、非油制型）和面酱"], 
            [, , "腐乳", "包括红腐乳、白腐乳、青腐乳和酱腐乳"], [, , "豆豉", "包括干豆豉、豆豉和水豆豉"], [, , "纳豆", ], [, , "纳豆粉", ], ["74", "绿色食品淀粉及淀粉制品\nNY/T1039-2014", "米淀粉", "包括糯米淀粉、粳米淀粉和籼米淀粉"], [, , "玉米淀粉", "包括白玉米淀粉、黄玉米淀粉"], [, , "高粱淀粉", ], [, , "麦淀粉", "包括小麦淀粉、大麦淀粉和黑麦淀粉"], [, , "绿豆淀粉", ], [, , "蚕豆淀粉", ],

            ["77", "绿色食品藕及其制品\nNY/T1044-2020", "藕", ], [, , "藕粉", "包括纯藕粉和调制藕粉"], [, , , "不适用于泡藕带、卤藕和藕罐头"], ["78", "绿色食品脱水蔬菜\nNY/T1045-2014", "脱水蔬菜", "经洗刷、清洗、切型、漂烫或不漂烫等预处理，采用热风干燥或低温冷冻干燥等工艺制成的蔬菜制品。"], [, , , "注：本标准也适用干制蔬菜，不适用于干制食用菌、竹笋干和蔬菜粉"], ["79", "绿色食品焙烤食品\nNY/T1046-2016", "面包", "以小麦粉、酵母和水为主要原料，添加或不添加辅料，经搅拌面团、发酵、整形、醒发、熟制等工艺制成的食品，以及在熟制前或熟制后在产品表面或内部添加奶油、蛋白、可可、果酱等的食品。包括软式面包、硬式面包、起酥面包、调理面包等。"], [, , "饼干", "以小麦粉（可添加糯米粉、淀粉等）为主要原料，加入（或不加入）糖、油脂及其他原料，经调粉（或调浆）、成型、烘烤（或煎烤）等工艺制成的口感酥松或松脆的食品。包括酥性饼干、韧性饼干、发酵饼干、压缩饼干、曲奇饼干、夹心饼干、威化饼干、蛋圆饼干、蛋卷、煎饼、装饰饼干、水泡饼干等。"], [, , "烘烤类月饼", ], [, , "烘烤类糕点", ], ["80", "绿色食品水果、蔬菜罐头\nNY/T1047-2021", "清渍类蔬菜罐头", ],

            ["94", "绿色食品膨化食品\nNY/T1511-2015", "膨化食品", "以谷类、薯类等为主要原料，也可配以各种辅料，采用直接挤压、焙烤、微波等方式膨化而制成的组织疏松或松脆的食品。"], [, , , "注：不适用于油炸型膨化食品、膨化豆制品。"], ["95", "绿色食品生面食、米粉制品\nNY/T1512-2021", "生面食制品", "以麦类、杂粮等为主要原料，通过和面、制条、制片等多道工序，经（或不经）干燥处理制成的制品，包括生干面制品(挂面、面叶、通心粉等)和生湿面制品(面条、切面、饺子皮、馄饨皮、烧卖皮等)"], [, , "米粉制品", "以大米为主要原料，加水浸泡、制浆、压条或挤压等加工工序制成的条状、丝状、块状、片状等不同形状的制品，以及大米仅经粉碎的加工工序制成的粉状制品。包括米粉干制品和湿制品。"], [, , , "不适用于方便面米制品及婴幼儿辅助食品。"], ["96", "绿色食品水产调味品\nNY/T1710-2020", "蚝油", "利用牡蛎蒸、煮后的汁液进行浓缩或直接用牡蛎肉酶解，再加入食糖、食盐、淀粉或者改性淀粉等原料，辅以其他配料和食品添加剂制成的调味品"], [, , "鱼露", "以鱼为原料，在较高的盐分下经酶解制成的鲜味液体调味品"], [, , "虾酱", "小型虾类经腌制、发酵制成的糊状食品"], [, , "虾油", "小型虾类发酵液体的浓缩液或虾酱上层的澄清液"], [, , "海鲜粉调味料", "以海产鱼、海水虾、海水贝、海水蟹类酶解物或其他浓缩抽提物为主原料，以味精、食用盐、香辛料等为辅料，经加工而成具有海鲜味的复合调味料"], 
            ["97", "绿色食品辣椒制品\nNY/T1711-2020", "干辣椒制品", "以鲜辣椒为主要原料，经干燥、烘焙或炒制等工艺加工制成的制品，如辣椒干、辣椒段（块）、辣椒粉（面）等"], [, , "油辣椒制品", "可供以鲜辣椒或干辣椒及食用油为主要原料，经加工制成的油和辣椒混合体的制品，如油辣椒、鸡辣椒、肉丝辣椒、豆豉辣椒等"], [, , "发酵辣椒制品", "以鲜辣椒或干辣椒为主要原料，经破碎、发酵或发酵腌制等工艺加工制成的制品，如剁辣椒、泡椒、辣豆瓣酱、辣椒酱等"], [, , "其他辣椒制品", "以鲜辣椒或干辣椒为主要原料，经破碎或不破碎、非发酵等工艺加工制成的制品，如香酥辣椒、糍粑辣椒等"], [, , , "注：不适用于辣椒油"], ["98", "绿色食品干制水产品\nNY/T1712-2018", "鱼类干制品", "包括生干品（如鱼肚、鳗鲞、银鱼干等）、煮干品、盐干品（如大黄鱼鲞、鳕鱼干等）、调味干鱼制品"], [, , "虾类干制品", "包括生干品（如虾干）、煮干品（如虾米、虾皮等）、盐干虾制品和调味干虾制品等"], [, , "贝类干制品", "包括生干品、煮干品、盐干品和调味干制品，如干贝、鲍鱼干、贻贝干、海螺干、牡蛎干等"], [, , "其他类干制水产品", "包括鱼翅、鱼肚、鱼唇、墨鱼干、鱿鱼干、章鱼干等。"], [, , , "注：不适用于海参和藻类干制品、即食干制水产品。"], 
            ["99", "绿色食品茶饮料\nNY/T1713-2018", "红茶饮料", ], [, , "绿茶饮料", ], [, , "花茶饮料", ], [, , "乌龙茶饮料", ], [, , "其他茶饮料", ], [, , "奶茶饮料", ], [, , "奶味茶饮料", ], [, , "果汁茶饮料", ], [, , "果味茶饮料", ], [, , "碳酸茶饮料", ], 
            [, , "复（混）合茶饮料", "以茶叶和植（谷）物的水提取液或其干燥粉为原料，加工制成的，具有茶与植（谷）物混合风味的液体饮料"], ["100", "绿色食品即食谷粉\nNY/T1714-2015", "即食谷粉", "以一种或几种谷类（包括大米、小米、玉米、大麦、小麦、燕麦、黑麦、荞麦、高粱和薏仁等）为主要原料（谷物占干物质组成的25%以上），添加（或不添加）其他辅料和（或不添加）适量的营养强化剂，经加工制成的冲调后即可食用的粉状食品。"], ["101", "绿色食品果蔬粉\nNY/T1884-2021", "水果粉", "以一种或一种以上水果为原料，经筛选（去皮、去核）、清洗、打浆、均质、杀菌、干燥、包装等工序，经过加工制成的粉状蔬菜产品。"], [, , "蔬菜粉", "以一种或一种以上蔬菜为原料，经筛选、清洗、打浆、均质、杀菌、干燥、包装等工序，经过加工制成的粉状蔬菜产品。"], [, , "复合果蔬粉", "以一种或一种以上蔬菜粉或水果粉为主要配料，添加或不添加食糖等辅料加工而成的可供直接食用的粉状冲调果蔬食品。"], [, , , "不适用于固体饮料类水果粉、淀粉类、调味料类蔬菜粉、脱水蔬菜、脱水水果。"], ["102", "绿色食品米酒\nNY/T1885-2017", "糟米型米酒", "所含的酒糟为米粒状糟米的米酒（包括花色型米酒）。包括普通米酒和无醇米酒"], [, , "均质型米酒", "经胶磨和均质处理后，呈糊状均质的米酒。包括普通米酒和无醇米酒"], [, , "清汁型米酒", "经过滤去除酒糟后的米酒。包括普通米酒和无醇米酒"], ["103", "绿色食品复合调味料\nNY/T1886-2021", "固态复合调味料", "以两种或两种以上调味品为主要原料，添加或不添加辅料，加工而成的呈固态的复合调味料。包括鸡粉调味料、牛肉粉调味料、排骨粉调味料及其他固态调味料。"], 
            [, , "半固态复合调味料", "以两种或两种以上的调味料为主要原料，添加或不添加其他辅料，加工而成的呈酱状的复合调味料。包括风味酱、沙拉酱及蛋黄酱等。"], [, , "液态复合调味料", "以两种或两种以上调味料为主要原料，添加或不添加辅料，加工而成的呈液态的复合调味料。包括鸡汁调味料等。"], [, , , "不含鸡精调味料、调味料酒、配制食醋、配制酱油；不适用于水产调味品。"], ["104", "绿色食品乳清制品\nNY/T1887-2010", "乳清粉", "包括脱盐乳清粉、非脱盐乳清粉"], [, , "乳清蛋白粉", "包括乳清浓缩蛋白粉、乳清分离蛋白粉"], ["105", "绿色食品软体动物休闲食品\nNY/T1888-2021", "头足类休闲食品", "以鲜或冻鱿鱼、墨鱼和章鱼等头足类水产品为原料，经清洗、预处理、水煮、调味、熟制或杀菌等工序制成的即食食品。"], [, , "贝类休闲食品", "以鲜或冻扇贝、牡蛎、贻贝、蛤、蛏、蚶等贝类水产品为原料，经清洗、水煮、调味、熟制或杀菌等工序制成的即食食品。"], [, , , "不适用于熏制软体动物休闲食品"], ["106", "绿色食品烘炒食品\nNY/T1889-2021", "烘炒食品", "以果蔬籽、果仁、坚果、豆类等为主要原料，添加或不添加辅料，经烘烤或炒制而成的食品。不包括以花生和芝麻为原料的烘炒食品。"], ["107", "绿色食品蒸制类糕点\nNY/T1890-2021", "糕点", "以谷类、豆类、薯类、油脂、糖、蛋等的一种或几种为主要原料，添加(或不添加)适量辅料，经调制、成型、熟制等工序制成的食品。"], 
            [, , "蒸制糕点", "水蒸熟制的一类糕点。"], [, , "蒸蛋糕类", "以鸡蛋为主要原料，经打蛋、调糊、注模、蒸制而成的组织松软的制品"], [, , "印模糕类", "以熟或生的原辅料，经拌合、印模成型、熟制或不熟制而成的口感松软的糕类制品"], [, , "韧糕类", "以糯米粉、糖为主要原料，经蒸制、成型而成的韧性糕类制品"], [, , "发糕类", "以小麦粉或米粉为主要原料调制成面团，经发酵、蒸制、成型而成的带有蜂窝状组织的松软糕类制品"], [, , "松糕类", "以粳米粉、糯米粉为主要原料调制成面团，经成型、蒸制而成的口感松软的糕类制品"], [, , "其他蒸制类糕点", "包括馒头、花卷产品"], ["108", "绿色食品配制酒\nNY/T2104-2018", "植物类配制酒", "利用植物的花、叶、根、茎、果为香源及营养源，经再加工制成的、具有明显植物香及有效成分的配制酒"], [, , "动物类配制酒", "利用食用或药食两用动物及其制品为香源及营养源，经再加工制成的、具有明显动物脂香及有效成分的配制酒"], [, , "动植物类配制酒", "同时利用动物、植物有效成分制成的配制酒"], 
            [, , "其他类配制酒", ], ["109", "绿色食品汤类罐头\nNY/T2105-2021", "汤类罐头", "以畜禽产品、水产品、食用菌和蔬菜类为主要原料，经加水烹调等加工后装罐，或生料加水装罐再加热煮熟而制成的罐头产品。"], [, , , "不适用于特殊膳食用灌装汤类食品"], ["110", "绿色食品谷物类罐头\nNY/T2106-2021", "面食罐头", "以谷物面粉为原料，经蒸煮或油炸、调配，配或不配蔬菜、肉类等配菜罐装制成的罐头产品，分为面罐头（含调味面罐头和加菜肴包面罐头）、面筋制品罐头。如茄汁肉沫面罐头、鸡丝炒面罐头、乌冬面罐头、面筋制品罐头等。"], [, , "饭类罐头", "以大米、糯米、小米等谷物为原料，经蒸煮成熟，配或不配蔬菜、肉类等配菜调配罐装制成的罐头产品；以及经过处理后的谷物、干果及其他原料（桂圆、枸杞等）罐装制成的罐头产品，分为米饭罐头（含调味米饭罐头和加菜肴包的米饭罐头）、八宝饭罐头。如米饭罐头、炒米罐头、八宝饭罐头等。"], [, , "粥类罐头", "以谷物为原料，配或不配豆类、干果、蔬菜、水果中的一种或几种原料，经处理后罐装制成的内容物为粥状的罐头产品，分为原味粥罐头、咸味粥罐头、甜味粥罐头。如八宝粥罐头、水果粥罐头、蔬菜粥罐头等。"], [, , , "不适用于玉米罐头"], ["111", "绿色食品食品馅料\nNY/T2107-2021", "食品馅料", "以植物的果实或块茎、肉与肉制品、蛋及蛋制品、水产制品、食用植物油等为原料，加糖或不加糖，添加或不添加其他辅料，经工业化生产用于食品行业的产品。"], [, , "蓉沙类馅料", "主要以莲籽、板栗、各种豆类为主要原料加工而成的馅料。"], [, , "果仁类馅料", "主要以核桃仁、杏仁、橄榄仁、瓜子仁、芝麻等果仁为主要原料加工而成的馅料。"], 
            [, , "果蔬类馅料", "主要以蔬菜及其制品、水果及其制品为主要原料加工而成的馅料。"], [, , "肉制品类馅料", "主要以蓉沙类、果仁类等馅料为基料添加火腿、叉烧、牛肉、禽类等肉制品加工而成的馅料。"], [, , "水产制品类馅料", "主要以蓉沙类、果仁类等馅料为基料添加虾米、鱼翅（水发）、鲍鱼等水产制品加工而成的馅料。"], [, , "其他类馅料", "以其他原料加工而成的馅料。"], ["112", "绿色食品熟粉及熟米制糕点\nNY/T2108-2021", "熟粉糕点", "将谷物粉或豆粉预先熟制，然后与其他原辅料混合而成的一类糕点"], [, , "熟米制糕点", "将米预先熟制，添加（或不添加）适量辅料，加工（黏合）成型的一类糕点"], ["113", "绿色食品鱼类休闲食品\nNY/T2109-2023", "鱼类休闲食品", "以鲜、冻鱼和鱼肉为主要原料，添加或不添加辅料，经烹调或干制等工艺熟制而成的可直接食用的鱼类制品。如调味鱼干、鱼脯、鱼松、鱼粒、鱼块、鱼片等"], [, , "注：不适用于即食生制鱼类制品、鱼类罐头食品、鱼糜制品、鱼骨制品、熏烤鱼类制品、明火烤制鱼类制品、油炸鱼类制品等。", ], ["114", "绿色食品冷藏、速冻调制水产品\nNY/T2976-2016", "裹面调制水产品", "以水产品为主料，配以辅料调味加工，成型后覆以裹面材料（面粉、淀粉、脱脂奶粉或蛋等加水混合调制的裹面浆或面包屑），经油炸或不经油炸，冷藏或速冻贮存、运输和销售的预包装食品，如裹面鱼、裹面虾。"], [, , "腌制调制水产品", "以水产品为主料，配以辅料调味，经过盐、酒等腌制，冷藏或冷冻贮存、运输和销售的预包装食品，如腌制翘嘴红鮊鱼等。"], 
            [, , "菜肴调制水产品", "以水产品为主料，配以辅料调味加工，经烹调、冷藏或速冻贮存、运输和销售的预包装食品，如香辣凤尾鱼等。"], [, , "烧烤（烟熏）调制水产品", "以水产品为主料，配以辅料调味，经修割整形、腌渍、定型、油炸或不经油炸等加工处理，进行烧烤或蒸煮（烟熏），冷藏或速冻贮存、运输和销售的预包装食品，如烤鳗等。"], ["115", "绿色食品淀粉糖和糖浆\nNY/T2110-2011", "食用葡萄糖", "包括结晶葡萄糖"], [, , "低聚异麦芽糖", "包括粉状和糖浆状"], [, , "麦芽糖", "包括粉状和糖浆状"], [, , "果葡糖浆", ], [, , "麦芽糊精", "适用于以玉米为原料生产的麦芽糊精产品"], [, , "葡萄糖浆", ], ["116", "绿色食品调味油\nNY/T2111-2021", "调味油", "以食用植物油为原料，萃取或添加植物或植物籽粒中呈香、呈味成分加工而成的食用调味品，如花椒油、藤椒油、辣椒油、蒜油、姜油、葱油、芥末油等"], ["117", "绿色食品啤酒花及其制品\nNY/T2973-2016", "压缩啤酒花", "将采摘的新鲜酒花球果经烘烤、回潮，垫以包装材料，打包成型制得的产品"], 
            [, , "颗粒啤酒花", "压缩啤酒花经粉碎、筛分、混合、压粒、包装后制得的颗粒产品"], [, , "二氧化碳啤酒花浸膏", "压缩啤酒花或颗粒啤酒花经二氧化碳萃取酒花中有效成分后制得的浸膏产品"], ["118", "绿色食品魔芋及其制品\nNY/T2981-2016", "魔芋粉", "包括普通魔芋粉和纯化魔芋粉"], [, , "魔芋膳食纤维", "包括原味魔芋膳食纤维和复合魔芋膳食纤维"], [, , "魔芋凝胶食品", "以水、魔芋或魔芋粉为主要原料，经磨浆去杂或加水润胀、加热糊化，添加凝固剂或其他食品添加剂，凝胶后模仿各种植物制成品或动物及其组织的特征特性加工制成的凝胶制品"], ["119", "绿色食品淀粉类蔬菜粉\nNY/T2984-2023", "马铃薯全粉", ], [, , "甘薯全粉", ], [, , "木薯全粉", ], [, , "葛根全粉", ], [, , "山药全粉", ], 
            [, , "芋头全粉", ], [, , , "注：淀粉类蔬菜粉指以含淀粉较高的蔬菜为原料，经挑拣、清洗、去皮、切片、漂洗、熟化或不熟化、粉碎或研磨、干燥等工艺，使用或不使用食品添加剂，加工而制成的雪花片状、颗粒状或粉状制品。"], ["120", "绿色食品低聚糖\nNY/T2985-2016", "低聚葡萄糖", ], [, , "低聚果糖", ], [, , "低聚麦芽糖", ], [, , "大豆低聚糖", ], [, , "棉子低聚糖", ], [, , , "注：包括上述产品的糖浆型和粉末型产品。本标准不适用于低聚异麦芽糖、麦芽糊精。"], ["121", "绿色食品糖果\nNY/T2986-2016", "硬质糖果", "以食糖或糖浆或甜味剂为主要原料，经相关工艺加工制成的硬、脆固体糖果。"], [, , "酥质糖果", "以食糖或糖浆或甜味剂、果仁碎粒（或酱）等为主要原料制成的疏松酥脆的糖果。"], 
            [, , "焦香糖果", "以食糖或糖浆或甜味剂、油脂和乳制品为主要原料，经相关工艺制成具有焦香味的糖果。"], [, , "凝胶糖果", "以食糖或糖浆或甜味剂、食用胶（或淀粉）等为主要原料，经相关工艺制成具有弹性和咀嚼性的糖果。"], [, , "奶糖糖果", "以食糖或糖浆或甜味剂、乳制品为主要原料制成具有乳香味的糖果。"], [, , "充气糖果", "以食糖或糖浆或甜味剂等为主要原料，经相关工艺制成内有分散细密气泡的糖果。"], [, , "压片糖果", "以食糖或糖浆（粉剂）或甜味剂等为主要原料，经混合、造粒、压制成型等相关工艺制成的固体糖果。"], ["122", "绿色食品果醋饮料\nNY/T2987-2016", "果醋饮料", "以水果、水果汁（浆）或浓缩水果汁（浆）为原料，经酒精发酵、醋酸发酵后制成果醋，再添加或不添加其他食品原辅料和（或）食品添加剂，经加工制成的液体饮料。"], ["123", "绿色食品湘式挤压糕点\nNY/T2988-2016", "湘式挤压糕点", "以粮食为主要原料，辅以食用植物油、食用盐、白砂糖、辣椒干等辅料，经挤压熟化、拌料、包装等工艺加工而成的糕点。"], ["124", "绿色食品豆类罐头\nNY/T3900-2021", "豆类罐头", "以一种或一种以上完整豆类籽粒为主要原料，经预处理、装罐、密封、杀菌、冷却制成的罐藏食品。包括盐水豆类罐头、糖水豆类罐头和茄汁豆类罐头"], [, , , "不适用于发酵豆类罐头。"], ["125", "绿色食品谷物饮料\nNY/T3901-2021", "谷物浓浆", "总固形物和来源于谷物的总膳食纤维含量较多(原料中谷物的添加量不少于4%)的谷物饮料。"], 
            [, , "谷物淡饮", "总固形物和来源于谷物的总膳食纤维含量较少(原料中谷物的添加量少于4%不少于1%)的谷物饮料。"], [, , "复合谷物饮料", "含有果蔬汁和（或）乳和（或）植物提取物成分辅料的谷物饮料。"], [, , , "不适用于以高蛋白含量谷物（如大豆）为主要原料制成的植物蛋白饮料。"], ["126", "绿色食品可食用鱼副产品及其制品\nNY/T3899-2021", "鱼子酱", "以鱼卵为原料，经搓制、水洗、拌盐等工序加工的鱼籽产品。"], [, , "粗鱼油", "从鱼粉生产的榨汁或水产品加工副产物中分离获得的油脂。"], [, , "精制鱼油", "粗鱼油经过脱胶、脱酸、脱色、脱臭等处理后获得的鱼油。"], [, , "鱼油粉", "以精制鱼油为原料，加入辅料制成的粉状产品。"], [, , , "适用除鱼肉以外的可食用鱼副产品及其加工品"], ["127", "绿色食品冲调类方便食品\nNY/T4268-2023", "冲调类果羹方便食品", "以大枣、桂圆、莲子、枸杞等果实为主要原料，添加辅料、调味料，添加或不添加食品添加剂，经部分或完全熟制、杀菌，干燥、包装而成的冲调即可食用的汤羹。"], [, , "冲调类菜羹方便食品", "以蔬菜及其制品中的一种或多种为主要原料，添加调味料等辅料，添加或不添加水产品及其制品、畜禽产品及其制品，添加或不添加食品添加剂，经部分或完全熟制、杀菌，干燥、包装而成的，冲调即可食用的汤羹。"], 
            [, , "冲调类荤羹方便食品", "以水产品及其制品、畜禽产品及其制品中的一种或多种为主要原料，添加蔬菜及其制品和调味料等辅料，添加或不添加食品添加剂，经部分或完全熟制、杀菌，干燥、包装而成的，冲调即可食用的羹。"], ["五、其他产品", , , ], ["128", "绿色食品天然矿泉水\nNY/T2979-2016", "天然矿泉水", "不适用于NY/T2980-2016所述的包装饮用水"], ["129", "绿色食品包装饮用水\nNY/T2980-2016", "包装饮用水", "注：不适用于饮用天然矿泉水、饮用纯净水和添加食品添加剂的包装饮用水"]];
        
        console.log('数据加载完成，行数:', fullExcelData.length);
        
        // 函数声明
        function showFullDirectory() {
            console.log('showFullDirectory函数被调用');
            
            var directoryView = document.getElementById('directoryView');
            var searchSection = document.querySelector('.search-section');
            var resultSection = document.getElementById('resultSection');
            
            if (!directoryView || !searchSection || !resultSection) {
                console.error('DOM元素未找到');
                alert('系统错误：页面元素未找到');
                return;
            }
            
            searchSection.style.display = 'none';
            resultSection.style.display = 'none';
            directoryView.style.display = 'block';
            
            var directoryContent = document.getElementById('directoryContent');
            if (!directoryContent) {
                console.error('目录内容元素未找到');
                alert('系统错误：目录内容未找到');
                return;
            }
            
            var directoryHTML = '<table class="directory-table">';
            directoryHTML += '<thead><tr><th>A列</th><th>B列</th><th>C列</th><th>D列</th></tr></thead><tbody>';
            
            // 显示所有数据
            fullExcelData.forEach(function(row, index) {
                directoryHTML += '<tr>';
                directoryHTML += '<td>' + (row[0] || '') + '</td>';
                directoryHTML += '<td>' + ((row[1] || '').toString().replace(/\n/g, '<br>')) + '</td>';
                directoryHTML += '<td>' + (row[2] || '') + '</td>';
                directoryHTML += '<td>' + (row[3] || '') + '</td>';
                directoryHTML += '</tr>';
            });
            
            directoryHTML += '</tbody></table>';
            directoryHTML += '<div style="margin-top: 15px; color: #666;">显示 ' + fullExcelData.length + ' 行数据（完整目录）</div>';
            
            directoryContent.innerHTML = directoryHTML;
            console.log('目录内容已更新');
        }
        
        function searchProduct() {
            console.log('searchProduct函数被调用');
            
            var productInput = document.getElementById('productInput');
            if (!productInput) {
                console.error('输入框元素未找到');
                alert('系统错误：输入框未找到');
                return;
            }
            
            var productName = productInput.value.trim();
            console.log('搜索关键词:', productName);
            
            if (!productName) {
                alert('请输入产品名称');
                return;
            }
            
            var resultSection = document.getElementById('resultSection');
            if (!resultSection) {
                console.error('结果区域元素未找到');
                alert('系统错误：结果区域未找到');
                return;
            }
            
            resultSection.style.display = 'block';
            
            // 搜索产品（在所有行中搜索ABCD列）
            var foundProducts = [];
            console.log('开始搜索，数据长度:', fullExcelData.length);
            
            for (var i = 0; i < fullExcelData.length; i++) {
                var row = fullExcelData[i];
                if (row && row.length >= 4) {
                    // 搜索所有列的内容
                    var searchText = '';
                    for (var j = 0; j < row.length; j++) {
                        if (row[j]) {
                            searchText += row[j].toString().toLowerCase() + ' ';
                        }
                    }
                    
                    if (searchText.toLowerCase().includes(productName.toLowerCase())) {
                        console.log('找到匹配产品在第', i + 1, '行:', row);
                        
                        // 查找对应的标准名称（向上查找第一个非空的标准名称）
                        var standardName = '';
                        var standardRowNum = i;
                        
                        // 向上查找直到找到标准名称
                        while (standardRowNum >= 0 && !standardName) {
                            var currentRow = fullExcelData[standardRowNum];
                            if (currentRow && currentRow[1] && currentRow[1].toString().trim()) {
                                standardName = currentRow[1].toString().trim();
                                break;
                            }
                            standardRowNum--;
                        }
                        
                        // 如果没找到标准名称，使用默认值
                        if (!standardName) {
                            standardName = '标准名称未找到';
                        }
                        
                        foundProducts.push({
                            name: row[2] || row[0] || row[1] || row[3] || '未命名产品',
                            rowNumber: i + 1,
                            standard: standardName,
                            description: row[3] || '',
                            fullRow: row
                        });
                    }
                }
            }
            
            console.log('找到匹配产品数量:', foundProducts.length);
            
            // 显示搜索结果
            if (foundProducts.length > 0) {
                var resultHTML = '';
                foundProducts.forEach(function(product, index) {
                    resultHTML += '<div style="background: #e8f5e8; border: 1px solid #c8e6c9; border-radius: 10px; padding: 15px; margin-bottom: 15px;">';
                    resultHTML += '<div style="font-weight: bold; color: #2e7d32;">第' + product.rowNumber + '行：' + product.name + '</div>';
                    resultHTML += '<div style="color: #666;">适用标准：' + product.standard + '</div>';
                    resultHTML += '<div style="color: #666;">' + product.description + '</div>';
                    resultHTML += '</div>';
                });
                resultSection.innerHTML = resultHTML;
            } else {
                resultSection.innerHTML = '<div style="background: #ffebee; border: 1px solid #ffcdd2; border-radius: 10px; padding: 15px; text-align: center;">申报产品不在绿色食品使用标准目录内</div>';
            }
        }
        
        function hideDirectory() {
            console.log('hideDirectory函数被调用');
            
            var directoryView = document.getElementById('directoryView');
            var searchSection = document.querySelector('.search-section');
            var resultSection = document.getElementById('resultSection');
            
            if (!directoryView || !searchSection || !resultSection) {
                console.error('DOM元素未找到');
                alert('系统错误：页面元素未找到');
                return;
            }
            
            directoryView.style.display = 'none';
            searchSection.style.display = 'block';
            resultSection.style.display = 'none';
        }
        
        // 回车键搜索支持
        document.getElementById('productInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchProduct();
            }
        });
        
        console.log('页面初始化完成，数据行数:', fullExcelData.length);
    </script>
</body>
</html>

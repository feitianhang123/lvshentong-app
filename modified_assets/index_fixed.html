<!DOCTYPE html>

            background: #f8fff8;
            border: 2px solid #e8f5e8;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .module-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
        }
        
        .module-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 5px;
        }
        
        .module-desc {
            font-size: 12px;
            color: #666;
        }
        
        .module-badge {
            background: #ff9800;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 8px;
        }
        
        .footer {
            background: #f5f5f5;
            padding: 15px 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1000;
        }
        
        .footer a {
            color: #4CAF50;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 600px) {

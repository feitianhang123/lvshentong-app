<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品目录 - 绿色食品申报通</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f8fff8 0%, #e8f5e8 100%); 
            min-height: 100vh; 
            padding: 0;
            margin: 0;
            color: #333;
        }
        
        .container { 
            width: 100%;
            height: 100vh;
            background: white; 
            border-radius: 0; 
            box-shadow: none;
            overflow: hidden;
            position: relative;
            padding-top: 120px;
            padding-bottom: 60px;
        }
        
        .header { 
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); 
            color: white; 
            padding: 40px 20px; 
            text-align: center;
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .sub-title {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .search-section {
            padding: 20px;
            background: #f8f9fa;
            height: calc(100vh - 180px);
            overflow-y: auto;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #4CAF50;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
        }
        
        .search-input:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }
        
        .search-btn {
            background: linear-gradient(135deg, #4CAF50 0%, #2e7d32 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }
        
        .directory-card {
            background: #f8fff8;
            border: 2px solid #e8f5e8;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .directory-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
        }
        
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 5px;
        }
        
        .card-subtitle {
            font-size: 14px;
            color: #666;
        }
        
        .result-section {
            padding: 20px;
            display: none;
        }
        
        .result-success {
            background: #e8f5e8;
            border: 1px solid #c8e6c9;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .result-error {
            background: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        
        .product-info {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        
        .product-row {
            font-weight: bold;
            color: #2e7d32;
            margin-bottom: 5px;
        }
        
        .directory-view {
            padding: 20px;
            height: calc(100vh - 180px);
            overflow-y: auto;
            display: none;
        }
        
        .directory-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 11px;
        }
        
        .directory-table th,
        .directory-table td {
            border: 1px solid #e0e0e0;
            padding: 4px 6px;
            text-align: left;
        }
        
        .directory-table th {
            background: #f8fff8;
            font-weight: bold;
            color: #2e7d32;
            position: sticky;
            top: 0;
        }
        
        .back-btn {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .footer {
            background: #f5f5f5;
            padding: 15px 20px;
            text-align: center;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="main-title">产品目录</div>
            <div class="sub-title">查看绿色食品适用标准目录</div>
        </div>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="productInput" class="search-input" placeholder="请输入产品名称...">
                <button class="search-btn" onclick="searchProduct()">搜索</button>
            </div>
            
            <div class="directory-card" onclick="showFullDirectory()">
                <div class="card-title">绿色食品产品适用标准目录（2023版）</div>
                <div class="card-subtitle">点击查看完整产品目录</div>
            </div>
        </div>
        
        <div id="resultSection" class="result-section"></div>
        
        <div id="directoryView" class="directory-view">
            <h3>绿色食品产品适用标准目录（2023版）</h3>
            <div id="directoryContent"></div>
            <button class="back-btn" onclick="hideDirectory()">返回搜索</button>
        </div>
        
        <div class="footer">
            <div>本软件内容均来源于中国绿色食品发展中心官网</div>
            <div>如果存在问题请联络作者：QQ:10780329</div>
        </div>
    </div>

    <script>
        // 简单的测试数据（先用少量数据测试功能）
        const testData = [
            ['序号', '标准名称', '适用产品名称', '适用产品别名及说明'],
            ['1', '绿色食品豆类\nNY/T285-2021', '大豆', '黄豆、黄大豆、黑豆、黑大豆、乌豆、青豆等'],
            ['', '', '蚕豆', '胡豆、佛豆、罗汉豆'],
            ['2', '绿色食品茶叶\nNY/T288-2018', '绿茶', '包括各种绿茶及以绿茶为原料的窨制花茶'],
            ['', '', '红茶', ''],
            ['3', '绿色食品玉米及其制品\nNY/T418-2023', '玉米', '普通玉米、高淀粉玉米、高蛋白玉米、高油玉米'],
            ['', '', '鲜食玉米', '包括甜玉米、糯玉米、甜加糯玉米'],
            ['4', '绿色食品稻米\nNY/T419-2021', '稻谷', ''],
            ['', '', '大米', '含糯米'],
            ['5', '绿色食品花生及制品\nNY/T420-2017', '食用花生（果、仁）', '']
        ];

        // 搜索产品
        function searchProduct() {
            console.log('搜索函数被调用');
            const productName = document.getElementById('productInput').value.trim();
            
            if (!productName) {
                alert('请输入产品名称');
                return;
            }
            
            const resultSection = document.getElementById('resultSection');
            resultSection.style.display = 'block';
            
            // 简单的搜索逻辑
            const foundProducts = [];
            for (let i = 1; i < testData.length; i++) {
                const row = testData[i];
                if (row && row.length >= 3 && row[2]) {
                    const productNameInExcel = row[2].toString().trim();
                    if (productNameInExcel && 
                        productNameInExcel.toLowerCase().includes(productName.toLowerCase())) {
                        
                        foundProducts.push({
                            name: productNameInExcel,
                            rowNumber: i + 1,
                            standard: row[1] || '暂无标准信息',
                            description: row[3] || '暂无说明'
                        });
                    }
                }
            }
            
            if (foundProducts.length > 0) {
                let resultHTML = '<div class="result-success">';
                resultHTML += `<strong>找到 ${foundProducts.length} 个匹配产品：</strong>`;
                
                foundProducts.forEach(product => {
                    resultHTML += `<div class="product-info">`;
                    resultHTML += `<div class="product-row">产品：${product.name}</div>`;
                    resultHTML += `<div>所在行：第 ${product.rowNumber} 行</div>`;
                    resultHTML += `<div>标准：${product.standard}</div>`;
                    resultHTML += `<div>说明：${product.description}</div>`;
                    resultHTML += `</div>`;
                });
                
                resultHTML += '</div>';
                resultSection.innerHTML = resultHTML;
            } else {
                resultSection.innerHTML = `
                    <div class="result-error">
                        <strong>未找到匹配产品。</strong>
                        <div>请检查产品名称是否正确。</div>
                    </div>
                `;
            }
        }

        // 显示完整目录
        function showFullDirectory() {
            console.log('目录卡函数被调用');
            
            document.querySelector('.search-section').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('directoryView').style.display = 'block';
            
            let directoryHTML = '<table class="directory-table">';
            directoryHTML += '<thead><tr><th>A列</th><th>B列</th><th>C列</th><th>D列</th></tr></thead><tbody>';
            
            // 显示测试数据
            testData.forEach((row, index) => {
                directoryHTML += '<tr>';
                directoryHTML += `<td>${row[0] || ''}</td>`;
                directoryHTML += `<td>${(row[1] || '').toString().replace(/\\n/g, '<br>')}</td>`;
                directoryHTML += `<td>${row[2] || ''}</td>`;
                directoryHTML += `<td>${row[3] || ''}</td>`;
                directoryHTML += '</tr>';
            });
            
            directoryHTML += '</tbody></table>';
            directoryHTML += `<div style="margin-top: 15px; color: #666;">显示 ${testData.length} 行测试数据</div>`;
            
            document.getElementById('directoryContent').innerHTML = directoryHTML;
        }

        // 隐藏目录视图
        function hideDirectory() {
            document.getElementById('directoryView').style.display = 'none';
            document.querySelector('.search-section').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
        }

        // 键盘事件支持
        document.getElementById('productInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchProduct();
            }
        });

        // 页面加载完成
        console.log('167版本模块一页面加载完成');
        console.log('使用简单测试数据验证功能');
        console.log('目录卡点击功能：正常');
        console.log('搜索功能：正常');
    </script>
</body>
</html>
